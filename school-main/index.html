<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>딥러닝 통합 학습실</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, "Noto Sans KR", sans-serif;
            background: #0f172a;
        }

        .tabs {
            min-height: 54px;
            display: flex;
            gap: 4px;
            padding: 6px;
            background: #111827;
            overflow-x: auto;
        }

        .tabs button {
            flex: 0 0 auto;
            padding: 12px 20px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: #1f2937;
            color: #e5e7eb;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .tabs button:hover {
            background: #374151;
        }

        .tabs button.active {
            border-color: #60a5fa;
            background: #2563eb;
            color: #ffffff;
        }

        iframe {
            display: block;
            width: 100%;
            height: calc(100vh - 54px);
            border: 0;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <nav class="tabs" aria-label="학습 페이지 선택">
        <button class="active" data-page="page1/index.html">신경망 실험실</button>
        <button data-page="page2/dist/index.html">딥러닝 시각화 학습</button>
        <button data-page="page3/index.html">Neural Vision Lab</button>
    </nav>

    <iframe
        id="frame"
        src="page1/index.html"
        title="딥러닝 학습 콘텐츠"
    ></iframe>

    <script>
        const frame = document.getElementById('frame');
        const tabButtons = document.querySelectorAll('.tabs button');

        tabButtons.forEach((button) => {
            button.addEventListener('click', () => {
                frame.src = button.dataset.page;
                tabButtons.forEach((item) => item.classList.remove('active'));
                button.classList.add('active');
            });
        });
    </script>
</body>
</html>
